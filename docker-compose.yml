version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:7.0
    container_name: 1xbet-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - 1xbet-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: 1xbet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - 1xbet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API
  backend:
    build:
      context: .
      dockerfile: Dockerfile-backend
    container_name: 1xbet-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/1xbet-platform?authSource=admin
      REDIS_URL: redis://redis:6379
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # Other APIs
      TRON_API_KEY: ${TRON_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - ./:/app
      - /app/node_modules
    
    networks:
      - 1xbet-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端应用
  frontend:
    build:
      context: .
      dockerfile: Dockerfile-frontend
    container_name: 1xbet-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
    
    depends_on:
      - backend
    
    networks:
      - 1xbet-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: 1xbet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - 1xbet-network

volumes:
  mongodb_data:
  redis_data:

networks:
  1xbet-network:
    driver: bridge
